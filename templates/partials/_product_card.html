{% macro product_card(product) %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/product_card.css') }}">
{% endblock %}
<!-- Product Card Component -->
<div class="product-card">
    <div class="image-container">
        <!-- Uses the real image URL from your dummy product list -->
        <img
            src="{{ product.image }}"
            alt="{{ product.name }}"
            class="product-image"
        />
    </div>

    <!-- Black Bar Base -->
    <div class="card-footer">
        {# Fallback to 'Coffee' if category isn't defined #}
        <p class="product-category">{{ product.category or 'Premium Coffee' }}</p>
        <h3 class="product-title">{{ product.name }}</h3>

        <div class="footer-row">
            {# Checks your dummy data's pricing structure #}

            <span class="product-price">£{{ product._lowest_box.price_gbp_unit }}</span>

            <button class="buy-btn">Add to Cart</button>
        </div>
    </div>
</div>
{% endmacro %}
